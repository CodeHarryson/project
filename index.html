<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FirstBank Assistant</title>
    <!-- Favicon: a simple bank emoji shown in the browser tab -->

    <script type="module" src="/src/main.jsx"></script>
